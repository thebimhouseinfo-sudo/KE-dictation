name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # Kích hoạt khi có code mới push lên nhánh main

# Cấp quyền cho GitHub Actions có thể ghi dữ liệu vào GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-with: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build # Lệnh tạo ra thư mục dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Chỉ định GitHub Actions lấy thư mục dist đi deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4